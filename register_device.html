<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Device Registration</title>
  <style>
    :root { color-scheme: light; --ink: #172033; --muted: #5c667a; --line: #d8dde8; --page: #f4f7fb; --accent: #0f766e; --panel: #fff; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif; color: var(--ink); background: var(--page); }
    main { width: min(760px, calc(100% - 28px)); margin: 32px auto; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 24px; box-shadow: 0 10px 28px rgba(23, 32, 51, 0.12); }
    h1 { margin: 0 0 8px; font-size: clamp(28px, 5vw, 48px); }
    p { color: var(--muted); line-height: 1.7; }
    label { display: grid; gap: 6px; margin: 16px 0; color: var(--muted); font-weight: 800; }
    input, textarea { width: 100%; min-height: 44px; border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; font: inherit; color: var(--ink); background: #fff; }
    textarea { min-height: 88px; resize: vertical; }
    button { border: 0; border-radius: 8px; min-height: 44px; padding: 10px 16px; background: var(--accent); color: #fff; font: inherit; font-weight: 800; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { margin-top: 18px; padding: 14px; border: 1px solid var(--line); border-radius: 8px; background: #f8fafc; white-space: pre-wrap; word-break: break-word; }
    .ok { border-color: #86efac; background: #f0fdf4; color: #14532d; }
    .err { border-color: #fecaca; background: #fef2f2; color: #7f1d1d; }
    code { font-family: Consolas, "Courier New", monospace; }
  </style>
</head>
<body>
  <main>
    <h1>Device Registration</h1>
    <p>展示用PCを後で識別できるように登録します。ここで入力した文字列、登録時刻、サーバーから見えたIP、自動生成IDが保存されます。</p>
    <label>
      識別用テキスト
      <input id="label" maxlength="120" placeholder="例: open-campus-roomA-pc1">
    </label>
    <label>
      メモ
      <textarea id="note" maxlength="240" placeholder="任意: 設置場所、担当者、WARP状態など"></textarea>
    </label>
    <button id="registerBtn" type="button">この端末を登録</button>
    <div id="result" class="result">未登録</div>
  </main>
  <script>
    const labelInput = document.getElementById("label");
    const noteInput = document.getElementById("note");
    const button = document.getElementById("registerBtn");
    const result = document.getElementById("result");

    function show(kind, data) {
      result.className = `result ${kind}`;
      result.textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2);
    }

    button.addEventListener("click", async () => {
      const label = labelInput.value.trim();
      if (!label) {
        show("err", "識別用テキストを入力してください。");
        return;
      }
      button.disabled = true;
      show("", "登録中...");
      try {
        const response = await fetch(new URL("api/register-device", window.location.href), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            label,
            note: noteInput.value.trim(),
            clientTime: new Date().toISOString(),
            userAgent: navigator.userAgent,
            url: window.location.href
          })
        });
        const text = await response.text();
        let body;
        try { body = JSON.parse(text); } catch { body = text; }
        if (!response.ok) {
          show("err", body);
          return;
        }
        show("ok", body);
      } catch (error) {
        show("err", String(error));
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
